<!DOCTYPE html>
<html lang="en">
<head>
    {{ partial "head.html" . }}
</head>
<body>
    {{ partial "nav.html" . }}

    <div class="page-shell">
        {{ partial "sidebar.html" . }}

        <main class="main-content">
            <article class="content-card">
                <h2>{{ .Params.publicationsCardTitle | default "Publications" }}</h2>
                <p class="more-link"><a href="{{ "/" | relLangURL }}">Back to Main Page</a></p>
                <div class="publication-list">
                    {{ range .Params.publications }}
                    {{ partial "publication-row.html" . }}
                    {{ end }}
                </div>
            </article>
        </main>
    </div>

    {{ partial "footer.html" . }}
</body>
</html>
